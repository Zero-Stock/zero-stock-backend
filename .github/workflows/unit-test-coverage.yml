name: unit-test-coverage

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: canteen_system.test_settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Run system checks
        run: python manage.py check

      - name: Run tests with coverage
        run: |
          coverage run \
            --source=common,core,operations \
            --omit='*/migrations/*,*/management/*,*/tests/*,manage.py,*/__init__.py' \
            manage.py test

      - name: Show coverage and enforce threshold
        run: |
          coverage report -m
          coverage report --fail-under=85

      - name: Generate coverage artifacts
        if: always()
        run: |
          coverage html
          coverage xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
