name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set project
        run: gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.CLOUD_RUN_SERVICE }} \
            --source . \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated

      - name: Get deployed image
        id: image
        run: |
          IMAGE=$(gcloud run services describe ${{ secrets.CLOUD_RUN_SERVICE }} \
            --region ${{ secrets.GCP_REGION }} \
            --format="value(spec.template.spec.containers[0].image)")
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Update migration job
        run: |
          gcloud run jobs update migrate-job \
            --image "${{ steps.image.outputs.image }}" \
            --region ${{ secrets.GCP_REGION }} \
            --set-cloudsql-instances zero-stock-dev:us-central1:zero-stock-db-small \
            --set-env-vars DB_NAME=zero_stock_small,DB_USER=zero_stock_user_small,DB_HOST=/cloudsql/zero-stock-dev:us-central1:zero-stock-db-small,DB_PORT=5432 \
            --set-secrets DB_PASSWORD=db-password-small:latest \
            --command python \
            --args manage.py,migrate,--noinput

      - name: Run migrations
        run: |
          gcloud run jobs execute migrate-job \
            --region ${{ secrets.GCP_REGION }} \
            --wait